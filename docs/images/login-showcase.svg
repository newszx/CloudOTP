<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CloudOTP 登录页高清预览</title>
  <desc id="desc">CloudOTP 的现代 SaaS 风格登录页，包含 2FA 管理平台介绍、TOTP 卡片和登录表单。</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#F7F5FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="card" x1="340" y1="120" x2="1280" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#FBFAFF"/>
      <stop offset="1" stop-color="#F1EEFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="35" stdDeviation="40" flood-color="#4F46E5" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="920" fill="url(#page)"/>
  <circle cx="1160" cy="180" r="260" fill="#DDD6FE" opacity="0.42"/>
  <circle cx="360" cy="710" r="260" fill="#EDE9FE" opacity="0.38"/>
  <rect x="154" y="98" width="1292" height="638" rx="50" fill="url(#card)" stroke="#E5E7EB" filter="url(#softShadow)"/>

  <g transform="translate(232 178)">
    <rect width="42" height="42" rx="14" fill="url(#purple)" filter="url(#cardShadow)"/>
    <path d="M21 10L31 14V22C31 29 26 34 21 36C16 34 11 29 11 22V14L21 10Z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="16" y="20" width="10" height="9" rx="2" stroke="white" stroke-width="2"/>
    <path d="M18 20V17.5C18 15.8 19.3 14.5 21 14.5C22.7 14.5 24 15.8 24 17.5V20" stroke="white" stroke-width="2"/>
    <text x="62" y="30" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850">2FA 管理</text>
  </g>

  <text x="232" y="332" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">安全、高效的</text>
  <text x="232" y="402" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="950">2FA</text>
  <text x="372" y="402" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">管理平台</text>
  <text x="232" y="472" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650">集中管理验证码、账号分类与分享链接，</text>
  <text x="232" y="508" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650">提升团队协作效率。</text>

  <g transform="translate(232 592)">
    <g filter="url(#cardShadow)">
      <rect width="142" height="142" rx="24" fill="white" stroke="#E2E8F0"/>
      <path d="M71 30L91 38V54C91 76 78 89 71 93C64 89 51 76 51 54V38L71 30Z" stroke="#7C3AED" stroke-width="5" stroke-linejoin="round"/>
      <path d="M62 58L68 64L82 49" stroke="#7C3AED" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="71" y="108" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">动态验证码</text>
      <text x="71" y="132" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">TOTP 实时生成</text>
    </g>
    <g transform="translate(166 0)" filter="url(#cardShadow)">
      <rect width="142" height="142" rx="24" fill="white" stroke="#E2E8F0"/>
      <path d="M45 48H65L72 56H99V92H43V48H45Z" fill="#7C3AED"/>
      <text x="71" y="108" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">分类管理</text>
      <text x="71" y="132" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">账号清晰归类</text>
    </g>
    <g transform="translate(332 0)" filter="url(#cardShadow)">
      <rect width="142" height="142" rx="24" fill="white" stroke="#E2E8F0"/>
      <path d="M59 75L50 84C43 91 32 80 39 73L52 60C58 54 66 55 71 61" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
      <path d="M83 67L92 58C99 51 110 62 103 69L90 82C84 88 76 87 71 81" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
      <text x="71" y="108" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">分享链接</text>
      <text x="71" y="132" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">安全共享验证码</text>
    </g>
    <g transform="translate(498 0)" filter="url(#cardShadow)">
      <rect width="142" height="142" rx="24" fill="white" stroke="#E2E8F0"/>
      <rect x="54" y="44" width="34" height="42" rx="5" stroke="#7C3AED" stroke-width="4"/>
      <path d="M64 37H82L91 46" stroke="#7C3AED" stroke-width="4" stroke-linejoin="round"/>
      <text x="71" y="108" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">快速复制</text>
      <text x="71" y="132" text-anchor="middle" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="650">一键复制验证码</text>
    </g>
  </g>

  <g transform="translate(764 205)">
    <ellipse cx="198" cy="220" rx="310" ry="150" fill="#DDD6FE" opacity="0.45"/>
    <path d="M214 72L306 112V185C306 267 248 316 214 330C180 316 122 267 122 185V112L214 72Z" fill="url(#purple)" opacity="0.88"/>
    <path d="M214 116L266 138V183C266 229 234 260 214 270C194 260 162 229 162 183V138L214 116Z" stroke="white" stroke-opacity="0.85" stroke-width="8"/>
    <rect x="188" y="176" width="52" height="48" rx="12" fill="white" opacity="0.9"/>
    <path d="M199 176V161C199 153 206 146 214 146C222 146 229 153 229 161V176" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <g transform="rotate(7 420 198)" filter="url(#cardShadow)">
      <rect x="340" y="126" width="340" height="206" rx="30" fill="white"/>
      <text x="374" y="176" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">TOTP 验证码</text>
      <text x="374" y="246" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="950" letter-spacing="4">123 456</text>
      <text x="374" y="296" fill="#8B5CF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="750">26</text>
      <rect x="374" y="310" width="238" height="10" rx="5" fill="#E9D5FF"/>
      <rect x="374" y="310" width="148" height="10" rx="5" fill="#7C3AED"/>
    </g>
  </g>

  <g transform="translate(1128 154)" filter="url(#cardShadow)">
    <rect width="250" height="512" rx="36" fill="white"/>
    <circle cx="218" cy="46" r="20" fill="#F5F3FF" stroke="#EDE9FE"/>
    <text x="218" y="53" text-anchor="middle" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="20">☀</text>
    <text x="42" y="72" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900">登录系统</text>
    <text x="42" y="108" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">欢迎回来，请使用账号登录</text>
    <text x="42" y="168" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">账号</text>
    <rect x="42" y="184" width="166" height="48" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="78" y="215" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">请输入账号</text>
    <text x="42" y="276" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">密码</text>
    <rect x="42" y="292" width="166" height="48" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="78" y="323" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="650">请输入密码</text>
    <rect x="42" y="364" width="18" height="18" rx="4" fill="#7C3AED"/>
    <path d="M46 373L50 377L57 368" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="379" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="750">记住登录状态</text>
    <rect x="42" y="420" width="166" height="52" rx="22" fill="url(#purple)"/>
    <text x="125" y="453" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">登录</text>
  </g>
</svg>
