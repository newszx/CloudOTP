<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CloudOTP 分类管理页高清预览</title>
  <desc id="desc">分类管理页面，展示搜索、添加分类、分类数量统计和分类表格。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="860"><stop stop-color="#FFFFFF"/><stop offset="1" stop-color="#F8FAFC"/></linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#4F46E5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#0F172A" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1600" height="860" fill="url(#bg)"/>
  <circle cx="1110" cy="180" r="260" fill="#EDE9FE" opacity="0.7"/>
  <g filter="url(#shadow)">
    <rect x="230" y="72" width="1140" height="96" rx="44" fill="white"/>
    <rect x="256" y="104" width="36" height="36" rx="12" fill="url(#primary)"/>
    <text x="268" y="129" fill="white" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">0</text>
    <text x="310" y="129" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">2FA 管理</text>
    <text x="460" y="129" fill="#4F46E5" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">2026/07/12 12:00:00 中国标准时间 (UTC+8)</text>
    <text x="920" y="129" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850">▰ 账号管理</text>
    <text x="1086" y="129" fill="#4F46E5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">▣ 分类管理</text>
    <text x="1262" y="129" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">↪ 退出登录</text>
    <rect x="1072" y="158" width="146" height="5" rx="3" fill="#6D5DF6"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="198" width="1140" height="514" rx="42" fill="white"/>
    <rect x="266" y="250" width="760" height="48" rx="24" fill="white" stroke="#CBD5E1"/>
    <text x="298" y="281" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="650">搜索分类名称</text>
    <rect x="1044" y="250" width="282" height="48" rx="24" fill="url(#primary)"/>
    <text x="1185" y="281" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">+ 添加分类</text>
    <g transform="translate(266 326)">
      <rect width="330" height="72" rx="18" fill="white" stroke="#CBD5E1"/>
      <text x="26" y="31" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">分类总数</text>
      <text x="26" y="58" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="950">3</text>
      <rect x="365" width="330" height="72" rx="18" fill="white" stroke="#CBD5E1"/>
      <text x="391" y="31" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">可删除分类</text>
      <text x="391" y="58" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="950">1</text>
      <rect x="730" width="330" height="72" rx="18" fill="white" stroke="#CBD5E1"/>
      <text x="756" y="31" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">账号总数</text>
      <text x="756" y="58" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="950">1</text>
    </g>
    <rect x="266" y="428" width="1060" height="218" rx="26" fill="white" stroke="#CBD5E1"/>
    <rect x="266" y="428" width="1060" height="64" rx="26" fill="#FAFBFF"/>
    <path d="M266 492H1326M266 544H1326M266 596H1326" stroke="#E2E8F0"/>
    <text x="302" y="468" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">分类名称</text>
    <text x="776" y="468" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">账号数量</text>
    <text x="1138" y="468" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850">操作</text>
    <text x="302" y="526" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">AI</text>
    <text x="776" y="526" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">1 个账号</text>
    <rect x="1136" y="507" width="92" height="34" rx="17" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="1182" y="530" text-anchor="middle" fill="#EF4444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">不可删除</text>
    <text x="302" y="578" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">亚马逊 TV</text>
    <text x="776" y="578" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">0 个账号</text>
    <rect x="1136" y="559" width="72" height="34" rx="17" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="1172" y="582" text-anchor="middle" fill="#EF4444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">删除</text>
    <text x="302" y="630" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">未分类</text>
    <text x="776" y="630" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">0 个账号</text>
    <rect x="1136" y="611" width="92" height="34" rx="17" fill="#FEF2F2" stroke="#FECACA"/>
    <text x="1182" y="634" text-anchor="middle" fill="#EF4444" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">不可删除</text>
